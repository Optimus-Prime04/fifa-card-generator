<!DOCTYPE html>
<html>

<head>
    <title>FIFA Card Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main-container">

        <div class="input-section">

            <h1>FIFA Card Generator</h1>

            <input type="text" id="playerName" placeholder="Player Name">
            <br><br>

            <input type="number" id="playerRating" placeholder="OVR">
            <br><br>

            <input type="text" id="playerPosition" placeholder="Position">
            <br><br>

            <input type="number" id="pace" placeholder="PAC">
            <input type="number" id="shooting" placeholder="SHO">
            <br><br>

            <input type="number" id="passing" placeholder="PAS">
            <input type="number" id="dribbling" placeholder="DRI">
            <br><br>

            <input type="number" id="defense" placeholder="DEF">
            <input type="number" id="physical" placeholder="PHY">
            <br><br>

            <select id="cardType">
                <option value="gold">Gold</option>
                <option value="icon">Icon</option>
                <option value="ucl">UCL</option>
            </select>

            <br><br>

            <input type="file" id="imageInput">

            <br><br>

            <button onclick="generateCard()">
                Generate Card
            </button>

            <button onclick="downloadCard()">
                Download Card
            </button>

        </div>

        <div class="preview-section">

            <div class="card gold-card" id="card">

                <img src="assets/gold.png"
                    id="cardBackground"
                    class="card-bg">

                <div id="cardRating" class="rating">99</div>

                <div id="cardPosition" class="position">ST</div>

                <img src=""
                    id="playerImage"
                    class="player-image">

                <div id="cardName" class="player-name">
                    PLAYER
                </div>

                <div class="stats">

                    <div class="stats-column">
                        <div><span id="cardPace">99</span> PAC</div>
                        <div><span id="cardShooting">99</span> SHO</div>
                        <div><span id="cardPassing">99</span> PAS</div>
                    </div>

                    <div class="stats-column">
                        <div><span id="cardDribbling">99</span> DRI</div>
                        <div><span id="cardDefense">99</span> DEF</div>
                        <div><span id="cardPhysical">99</span> PHY</div>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
